<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Manager Herb Inc</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Contact Manager</h1>
      <div>
        <p class="company-name">Herb Inc.</p>
        <p class="company-slogan">All herbs must die!</p>
      </div>
      <button id = "quit-contactmanger-button" type="Quit">Quit</button>
    </header>

    <section id="contact-list">
      <h2>Contact List</h2>
      <input
        id="search-contact-input"
        type="text"
        placeholder="Enter a name..."
      />
      <button id="search-contact-button">Search</button>
      <button id="add-contact-button">Add Contact</button>
      <div class="grid" id="contact-grid"></div>
    </section>

    <section id="add-contact">
      <h2>Add Contact</h2>
      <div>
        <label>Name (required):</label>
        <input
          id="add-contact-input"
          type="text"
          placeholder="Enter a Name..."
        />

        <label>Email (can be empty):</label>
        <input
          id="add-email-input"
          type="email"
          placeholder="Enter an email..."
        />

        <label>GSM number (can be empty):</label>
        <input
          id="add-gsm-input"
          type="tel"
          placeholder="Enter a gsm number..."
        />

        <button id="add-submit-button" type="button">Add</button>
        <button id="add-cancel-button" type="button">Cancel</button>
      </div>
    </section>

    <section id="change-contact">
      <h2>Change Contact</h2>
      <div>
        <label>Naam (required):</label>
        <input
          id="change-contact-input"
          type="text"
          placeholder="Enter a Name..."
        />

        <label>Email (can be empty):</label>
        <input
          id="change-email-input"
          type="email"
          placeholder="Enter an email..."
        />

        <label>GSM nummer (can be empty):</label>
        <input
          id="change-gsm-input"
          type="tel"
          placeholder="Enter a gsm number..."
        />

        <button id="change-submit-button" type="button">Submit changes</button>
        <button id="change-cancel-button"type = "button">Cancel</button>
      </div>
    </section>

    <section id="remove-contact">
      <h2>Remove Contact</h2>
      <p>Are you sure you want to remove this contact?</p>
      <button id="remove-confrim-button"type = "button">Yes, im sure Remove contact</button>
      <button id="remove-cancel-button"type = "button">No,Dont Remove Contact</button>
      <div id="remove-contact-card"></div>
    </section>
    <script type="module" src="../src/main.js"></script>
  </body>
</html>
